<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>#f5dedc</title>
</head>

<body bgcolor="#f5dedc">
    <header>
        <h1>Contact Us</h1>
        <p>We do love to hear from you! Please fill out the form below.</p>
    </header>
    <main>
        <form action="#" method="post">
            <table>
                <tr>
                    <td><label for="name">Full Name:</label></td>
                    <td>
                        <input type="text" id="name" name="name" placeholder="Enter your name" required />
                    </td>
                </tr>

                <tr>
                    <td><label for="email">Email Address:</label></td>
                    <td>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required />
                    </td>
                </tr>

                <tr>
                    <td><label for="phone">Phone Number:</label></td>
                    <td>
                        <input type="tel" id="phone" name="phone" placeholder="123-456-7890" />
                    </td>
                </tr>

                <tr>
                    <td><label for="password">Create a Password:</label></td>
                    <td><input type="password" id="password" name="password" /></td>
                </tr>

                <tr>
                    <td><label for="age">Your Age:</label></td>
                    <td>
                        <input type="number" id="age" name="age" min="1" max="120" />
                    </td>
                </tr>

                <tr>
                    <td><label for="date">Preferred Contact Date:</label></td>
                    <td><input type="date" id="date" name="date" /></td>
                </tr>
                <tr>
                    <td>How would you like us to contact you?</td>
                    <td>
                        <input type="radio" id="contact-email" name="contact-method" value="email" checked />
                        <label for="contact-email">Email</label>
                        <input type="radio" id="contact-phone" name="contact-method" value="phone" />
                        <label for="contact-phone">Phone</label>
                    </td>
                </tr>

                <tr>
                    <td><label for="file">Upload a File (optional):</label></td>
                    <td><input type="file" id="file" name="file" /></td>
                </tr>

                <tr>
                    <td>
                        <label for="satisfaction">Rate Your Satisfaction (1-10):</label>
                    </td>
                    <td>
                        <input type="range" id="satisfaction" name="satisfaction" min="1" max="10" />
                    </td>
                </tr>

                <tr>
                    <td><label for="message">Your Message:</label></td>
                    <td>
                        <textarea id="message" name="message" rows="5" cols="40"
                            placeholder="Write your message here..."></textarea>
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <input type="submit" value="Send Message" />
                        <input type="reset" value="Clear Form" />
                    </td>
                </tr>
            </table>
        </form>
    </main>

    <footer>
        <p>Thank you for reaching out. We wll respond as soon as possible!</p>
        <p>&copy; 2026 Fashion & Beauty Blog. All rights reserved.</p>
        <ul>
            <li><a href="./index.html">Home</a></li>
            <li><a href="./about.html">About</a></li>
        </ul>
    </footer>
</body>

</html>
